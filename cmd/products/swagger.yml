openapi: "3.0.3"
info:
  title: Products API
  description: REST API for product management.
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local

paths:
  /api/v1/products:
    post:
      summary: Create a product
      operationId: createProduct
      tags: [products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      summary: List products (paginated)
      operationId: listProducts
      tags: [products]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: A page of products.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

  /api/v1/products/{id}:
    delete:
      summary: Delete a product
      operationId: deleteProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Product deleted.
        "404":
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [ops]
      responses:
        "200":
          description: Service is healthy.

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      tags: [ops]
      responses:
        "200":
          description: Prometheus text exposition format.

components:
  schemas:
    CreateProductRequest:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          example: Widget
        description:
          type: string
          example: A useful widget
        price:
          type: number
          format: double
          example: 9.99

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProductList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
